schema_version: 1
name: signal-tracker
alias: "Signal Tracker"
version: "1.0.0"
description: "Track smart money wallet activity and aggregated buy signals via onchainos CLI"
author:
  name: "Mingtao"
  github: "ganlinux"
license: MIT
category: analytics
tags:
  - smart-money
  - signals
  - wallet-tracker
  - analytics

components:
  skill:
    dir: skills/signal-tracker
  binary:
    repo: ganlinux/plugin-store-community/signal-tracker
    asset_pattern: "signal-tracker-{target}"
    checksums_asset: checksums.txt

build:
  lang: rust
  source_repo: ganlinux/signal-tracker
  source_commit: "0000000000000000000000000000000000000000"  # replace with real commit SHA
  source_dir: .
  binary_name: signal-tracker

api_calls: []
